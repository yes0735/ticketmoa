name: Sync KOPIS Performances

on:
  schedule:
    # 매일 새벽 1시 KST (= 전날 16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: ./ticketmoa-server
        run: npm ci

      - name: Run KOPIS sync batch job
        working-directory: ./ticketmoa-server
        env:
          KOPIS_API_KEY: ${{ secrets.KOPIS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/sync-kopis.js
